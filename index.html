<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GS Score</title>
    <meta
      name="description"
      content="The group's World Cup hub: live scores, group tables, knockout bracket and a Monte Carlo projection of who is on for the sweepstake prize money."
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="bg__glow"></div>
      <div class="bg__pitch"></div>
      <div class="bg__embers" id="bgEmbers"></div>
      <div class="bg__vignette"></div>
    </div>
    <div class="bunting" id="bunting" aria-hidden="true"></div>
    <canvas id="confetti" aria-hidden="true"></canvas>

    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand__mark">⚽</span>
          <div>
            <strong>GS Score</strong>
            <span class="brand__sub">16 entrants · €160 pot · live</span>
          </div>
        </div>
        <div class="topbar__right">
          <span class="updated">Updated <time id="updated">…</time></span>
          <button class="btn" id="h2hOpen" type="button">Head to head</button>
        </div>
      </header>

      <div class="ticker" id="ticker" aria-label="Live and recent scores"></div>

      <p class="banner" id="banner" role="status" hidden></p>

      <main>
        <section class="hero" id="hero" aria-label="Sweepstake race"></section>

        <nav class="tabs" id="tabs" aria-label="Sections">
          <button class="tab is-active" data-tab="live" aria-selected="true" type="button">Live &amp; today</button>
          <button class="tab" data-tab="leaderboard" aria-selected="false" type="button">Leaderboard</button>
          <button class="tab" data-tab="tables" aria-selected="false" type="button">Group tables</button>
          <button class="tab" data-tab="bracket" aria-selected="false" type="button">Knockout</button>
          <button class="tab" data-tab="whatif" aria-selected="false" type="button">What-if</button>
          <button class="tab" data-tab="fixtures" aria-selected="false" type="button">Fixtures</button>
          <button class="tab" data-tab="goldenboot" aria-selected="false" type="button">Golden Boot</button>
        </nav>

        <section class="panel" id="panel" aria-live="polite"></section>
      </main>

      <footer class="footer" id="footer"></footer>
    </div>

    <div class="modal" id="h2hModal" hidden></div>

    <div class="mdrawer" id="matchDrawer" hidden>
      <aside class="mdrawer__panel" role="dialog" aria-modal="true" aria-label="Match detail"></aside>
    </div>

    <!-- Sentry served first-party (vendored) so tracker blockers cannot block the
         sentry-cdn.com domain. Events still POST to the Sentry ingest host, which an
         aggressive blocker may also block; that cannot be tunnelled on a static host. -->
    <script src="./vendor/sentry.min.js"></script>
    <script>
      if (window.Sentry?.init) {
        window.Sentry.init({
          dsn: "https://1a7a3df5710a91c4eb0b649c303519a2@o4511587918479360.ingest.de.sentry.io/4511587923066960",
          // Relay events through our Worker so tracker blockers that block the Sentry
          // ingest domain can't drop them. Must match the deployed Worker origin.
          tunnel: "https://goon-squad-data.gs-wc.workers.dev/tunnel",
          integrations: [window.Sentry.replayIntegration()],
          replaysSessionSampleRate: 1.0,
          replaysOnErrorSampleRate: 1.0,
          enableLogs: true,
          tracesSampleRate: 0,
        });
        // Stable per-browser id so repeat visits count as one user, not a new one each
        // time. Persisted in a first-party cookie (1 year) with a localStorage mirror.
        try {
          window.Sentry.setUser({ id: goonSquadVisitorId() });
        } catch (error) {
          /* setUser is best-effort */
        }
        window.dispatchEvent(new Event("sentry-ready"));
      }

      function goonSquadVisitorId() {
        var key = "gs_uid";
        var id = null;
        try {
          id = window.localStorage.getItem(key);
        } catch (error) {
          /* storage may be blocked */
        }
        if (!id) id = readGsCookie(key);
        if (!id) {
          id =
            window.crypto && window.crypto.randomUUID
              ? window.crypto.randomUUID()
              : "u-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
        }
        try {
          window.localStorage.setItem(key, id);
        } catch (error) {
          /* storage may be blocked */
        }
        var expires = new Date(Date.now() + 365 * 864e5).toUTCString();
        document.cookie = key + "=" + encodeURIComponent(id) + "; expires=" + expires + "; path=/; SameSite=Lax";
        return id;
      }

      function readGsCookie(name) {
        var match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
        return match ? decodeURIComponent(match[1]) : null;
      }
    </script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
