name = "goon-squad-data"
main = "worker.js"
compatibility_date = "2026-06-01"
# The Anthropic SDK (AI analysis) needs the Node compatibility shims when bundled.
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Non-secret config. Secrets are set with:
#   npx wrangler secret put FOOTBALL_DATA_TOKEN
#   npx wrangler secret put ANTHROPIC_API_KEY    (powers the AI-analysis cron; nothing generates without it)
# Competitions served, as CODE:season pairs; the first is the default for legacy
# unprefixed routes. Season is football-data's starting year: 2026 = the 2026-27
# season. NOTE: these vars are applied on every deploy, so always deploy from an
# up-to-date checkout.
[vars]
FOOTBALL_DATA_COMPETITIONS = "PL:2026,CL:2026"
# Google OAuth web client id (public, not a secret). Sign-in returns 501 until this
# is set to a real client id whose authorized JavaScript origins include the site
# origin and http://localhost:8731.
GOOGLE_CLIENT_ID = ""
# AI analysis model. Any override must support adaptive thinking + structured outputs.
ANTHROPIC_MODEL = "claude-sonnet-5"

# AI analysis cron, one pass per configured competition per tick. Ticks every
# minute, but the game-state signature decides which ticks actually generate:
# every 10 minutes of normal play, every 5 in extra time, per kick during a
# shootout, plus immediately on any goal, red card or status change, and once
# after full time. User visits only ever read the stored copy, so cost is fixed
# per match, not per visitor. Idle ticks call no one.
[triggers]
crons = ["* * * * *"]

# Per-IP rate limit: 200 requests / 60s. A real poller uses ~2/min plus a few match
# opens, so this is generous for shared office/home NATs while blocking floods.
# Needs Wrangler 4.36.0+. period must be 10 or 60. The Worker no-ops if it is absent.
[[unsafe.bindings]]
name = "LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 200, period = 60 }

# Accounts (users, sessions, follows). Created with:
#   npx wrangler d1 create squad-goals
#   npx wrangler d1 execute squad-goals --remote --file=schema.sql
[[d1_databases]]
binding = "DB"
database_name = "squad-goals"
database_id = "69070b1b-d4f5-4c2d-9e0d-cf64dd44ab39"

# Banter storage (shared per-match reactions + one-line messages). To switch it on:
#   1. npx wrangler kv namespace create BANTER
#   2. paste the printed id below and uncomment this block
#   3. npx wrangler deploy
# Until then the Worker returns 503 for /banter and the site hides the Banter tab.
[[kv_namespaces]]
binding = "BANTER"
id = "b615f8b1d77c47b9a01219387908d0c6"

# AI analysis storage (required for the feature): the cron writes generated analyses
# here and GET /analysis/:id is a pure read of it. Created with:
#   npx wrangler kv namespace create ANALYSIS_CACHE
 [[kv_namespaces]]
 binding = "ANALYSIS_CACHE"
 id = "333db99e5e524673bdb6a32279544dac"

# Daily game storage (one paper-run result per visitor per day + daily leaderboard).
# To switch it on:
#   1. npx wrangler kv namespace create DAILY_GAME
#   2. paste the printed id below and uncomment this block
#   3. npx wrangler deploy
# Until then the game still works locally, but /paperrun returns 503 and the shared
# daily leaderboard is hidden.
[[kv_namespaces]]
binding = "DAILY_GAME"
id = "916a4c1270ba454795040a18c59b22c8"
