name = "goon-squad-data"
main = "worker.js"
compatibility_date = "2026-06-01"
workers_dev = true

# Non-secret config. The API token is a secret, set with:
#   npx wrangler secret put FOOTBALL_DATA_TOKEN
[vars]
FOOTBALL_DATA_COMPETITION = "WC"
FOOTBALL_DATA_SEASON = "2026"

# Per-IP rate limit: 200 requests / 60s. A real poller uses ~2/min plus a few match
# opens, so this is generous for shared office/home NATs while blocking floods.
# period must be 10 or 60.
[[ratelimit]]
name = "LIMITER"
namespace_id = "1001"
simple = { limit = 200, period = 60 }
