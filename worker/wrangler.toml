name = "goon-squad-data"
main = "worker.js"
compatibility_date = "2026-06-01"
workers_dev = true

# Non-secret config. The API token is a secret, set with:
#   npx wrangler secret put FOOTBALL_DATA_TOKEN
[vars]
FOOTBALL_DATA_COMPETITION = "WC"
FOOTBALL_DATA_SEASON = "2026"

# Per-IP rate limit: 200 requests / 60s. A real poller uses ~2/min plus a few match
# opens, so this is generous for shared office/home NATs while blocking floods.
# Needs Wrangler 4.36.0+. period must be 10 or 60. The Worker no-ops if it is absent.
[[unsafe.bindings]]
name = "LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 200, period = 60 }

# Banter storage (shared per-match reactions + one-line messages). To switch it on:
#   1. npx wrangler kv namespace create BANTER
#   2. paste the printed id below and uncomment this block
#   3. npx wrangler deploy
# Until then the Worker returns 503 for /banter and the site hides the Banter tab.
# [[kv_namespaces]]
# binding = "BANTER"
# id = "PASTE_KV_NAMESPACE_ID_HERE"

# Daily shootout storage (one result per visitor per day + daily leaderboard).
# To switch it on:
#   1. npx wrangler kv namespace create SHOOTOUT
#   2. paste the printed id below and uncomment this block
#   3. npx wrangler deploy
# Until then the game still works locally, but /shootout returns 503 and the shared
# daily leaderboard is hidden.
# [[kv_namespaces]]
# binding = "SHOOTOUT"
# id = "PASTE_KV_NAMESPACE_ID_HERE"
