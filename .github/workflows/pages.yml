name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # As frequent as GitHub Actions allows. The scheduler enforces a 5 minute
    # minimum and runs are best effort, so true per-minute refresh is not possible
    # here. Runs also fire on every push to main and via manual dispatch.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Persist fetched match detail across runs. Each deploy checks out main fresh, so
      # without this the Golden Boot tally only ever sees the committed seed files plus
      # whatever one run can re-fetch under the 30/min API cap - matches that fail or get
      # starved that run vanish from the board, so scorer totals chronically undercount.
      # An accumulating cache (unique key + prefix restore-keys) restores the latest set,
      # the fetch script fetches only matches it does not already hold final detail for,
      # and the post-job save writes the grown set back. Coverage converges to complete.
      - name: Restore accumulated match detail
        uses: actions/cache@v4
        with:
          path: data/*/matches
          key: match-detail-2026-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            match-detail-2026-
      - name: Fetch live competition data
        run: npm run fetch:live
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_DATA_COMPETITIONS: "PL:2026,CL:2026"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
