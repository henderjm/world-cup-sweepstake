name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Static fallback refreshes for the 12-hour match window only. The Worker owns
    # minute-live delivery; burning API requests on overnight Pages deploys adds no
    # value. GitHub schedules are UTC and best effort.
    - cron: "0 11-22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install dependencies
        run: npm ci
      - name: Build API-Football client
        run: go build -o /tmp/squad-goals-api ./cmd/api-football
      # Persist fetched match detail across runs. Each deploy checks out main fresh, so
      # without this the Golden Boot tally only ever sees the committed seed files plus
      # whatever one run can re-fetch - matches that fail or get
      # starved that run vanish from the board, so scorer totals chronically undercount.
      # An accumulating cache (unique key + prefix restore-keys) restores the latest set,
      # the fetch script fetches only matches it does not already hold final detail for,
      # and the post-job save writes the grown set back. Coverage converges to complete.
      - name: Restore accumulated match detail
        uses: actions/cache@v4
        with:
          path: |
            data/*/matches
            data/PL/players.json
          key: api-football-data-2026-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            api-football-data-2026-
      - name: Fetch live competition data
        run: npm run fetch:live
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_CLI: /tmp/squad-goals-api
          API_FOOTBALL_COMPETITIONS: "PL:2026,CL:2026"
      # Fantasy draft pool (Phase 4). The cached file and script freshness guard make
      # this a daily upstream refresh even though the Pages job runs more frequently.
      - name: Fetch fantasy player pool
        run: npm run fetch:fantasy-players
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_CLI: /tmp/squad-goals-api
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build Svelte app
        run: npm run build
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
