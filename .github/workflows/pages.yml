name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # As frequent as GitHub Actions allows. The scheduler enforces a 5 minute
    # minimum and runs are best effort, so true per-minute refresh is not possible
    # here. Runs also fire on every push to main and via manual dispatch.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch live World Cup data
        run: npm run fetch:live
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
